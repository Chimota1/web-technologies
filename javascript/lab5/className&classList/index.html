<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>task2</title>
</head>
<body>
    <div class="blub-buttons">
    <button class="default-button">Default Light bulb</button>
    <button class="energy-saving-button">Energy-saving bulb</button>
    <button class="led-button">LED bulb</button>
    </div>
    <div class="images">
    <img class="default-on" src="./img/default-on.jpeg" alt="Default Light bulb on">
    <img class="default-off" src="./img/default-off.jpeg" alt="Default Light bulb off">
    <img class="energy-saving-on" src="./img/energy-on.webp" alt="Energy-saving bulb on">
    <img class="energy-saving-off" src="./img/energy-off.webp" alt="Energy-saving bulb off">
    <img class="led-on" src="./img/led-on.webp" alt="LED bulb on">
    <img class="led-off" src="./img/led-off.webp" alt="LED bulb off">
    </div>
    <div class="on-off-buttons">
    <button class="on-button">ON</button>
    <button class="off-button">OFF</button>
    <button class="brightness">Brightness</button>
    </div>
    <script src="./script.js"></script>
</body>
</html>
