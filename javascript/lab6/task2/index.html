<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>To-do List</h1>
    </header>
    <div class="wrapper">
        <main>
            <div class="manipulate-btns">
                <button id="add-btn">Add Task</button>
                <button id="sort-btn">Sort Tasks</button>
            </div>
            <div class="sort-btns">
                <button id="sort-by-date">За датою додавання</button>
                <button id="sort-by-status">За виконанням</button>
                <button id="sort-by-update">За датою оновлення</button>
                <button id="reset-sort">Скинути</button>
            </div>
            <div class="tasks-container">
                <h3>Tasks:</h3>
                <p id="list-empty__text">Список задач відсутній, додайте нову задачу.</p>
                <ul class="tasks-list"></ul>
            </div>
        </main>
    </div>
    <div class="snackbar" role="alert">
        <span class="snackbar__text">текст сповіщення</span>
    </div>
    <div class="modal-add" role="dialog" aria-modal="true">
        <div class="modal-add__content">
            <h2 class="modal-add__title">Add Task</h2>
            <form id="add-form">
                <input id="add-input" class="modal-add__input" type="text" placeholder="Enter task name" required>
                <button type="submit" id="save-btn" class="modal-add__save-btn">Save</button>
            </form>
        </div>
    </div>
    <div class="modal-change" role="dialog" aria-modal="true">
        <div class="modal-change__content">
            <h2 class="modal-change__title">Edit Task</h2>
            <form id="edit-form">
                <input id="edit-input" class="modal-change__input" type="text" placeholder="Enter new task name" required>
                <button type="submit" id="update-btn" class="modal-change__update-btn">Update</button>
            </form>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
